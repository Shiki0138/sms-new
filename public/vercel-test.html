<!DOCTYPE html>
<html>
<head>
    <title>Vercel Test</title>
</head>
<body>
    <h1>Vercel Deployment Test</h1>
    <p>If you see this, static files work.</p>
    <div id="assets-test"></div>
    <script>
        // Test if we can fetch assets
        fetch('/assets/index-CBCmoIQh.js')
            .then(res => {
                document.getElementById('assets-test').innerHTML = 
                    `Asset fetch status: ${res.status} ${res.statusText}<br>` +
                    `Content-Type: ${res.headers.get('content-type')}`;
            })
            .catch(err => {
                document.getElementById('assets-test').innerHTML = 
                    `Asset fetch error: ${err.message}`;
            });
    </script>
</body>
</html>
